<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directorio Amarillo · Valle Sagrado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      --bg: #f4f0e8;
      --panel: #fffaf1;
      --ink: #1f2a1f;
      --muted: #4a5a49;
      --line: #d8cfbf;
      --earth: #7f5a2a;
      --green: #2f6e4f;
      --alert: #8b2e1a;
      --shadow: 0 20px 50px rgba(31, 42, 31, 0.14);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 15%, rgba(127, 90, 42, 0.12), transparent 33%),
        radial-gradient(circle at 84% 22%, rgba(47, 110, 79, 0.12), transparent 32%),
        linear-gradient(180deg, #f7f3ec, #ece3d3 70%, #e6dac8);
    }

    .app { position: relative; }

    .card {
      background: linear-gradient(180deg, rgba(255, 250, 241, 0.98), rgba(250, 244, 233, 0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .map-wrap { position: relative; }

    #map {
      height: 100dvh;
      width: 100%;
    }

    .legend-toggle {
      display: none;
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 710;
      width: auto;
      min-height: 40px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 250, 241, 0.95);
      border: 1px solid #d5caba;
      font-size: 0.82rem;
      font-weight: 700;
      color: #2a4530;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    }

    .legend {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 700;
      padding: 10px;
      width: 220px;
      background: rgba(255, 250, 241, 0.95);
      border: 1px solid #d5caba;
      border-radius: 12px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.1);
      font-size: 0.8rem;
    }

    .legend h3 {
      margin: 0 0 8px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #2a4530;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.25);
    }

    .left-menu {
      position: fixed;
      top: 16px;
      left: 14px;
      z-index: 900;
      width: 210px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .title-mini {
      margin: 0 0 4px;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.4rem;
      line-height: 1;
      color: #2b3f2f;
    }

    .btn-menu,
    .btn-primary,
    .btn-secondary,
    button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #d3c8b8;
      padding: 10px 11px;
      font-family: inherit;
      font-size: 0.94rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
      background: #fffef9;
      color: var(--ink);
    }

    .btn-menu:hover,
    .btn-primary:hover,
    .btn-secondary:hover,
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(31, 42, 31, 0.14);
    }

    .btn-primary {
      background: linear-gradient(135deg, #3e7f5c, #2f6e4f);
      color: #fff;
      border: 1px solid #2b6146;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #8f6a37, #7f5a2a);
      color: #fff;
      border: 1px solid #6a491f;
    }

    .drawer {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 920;
      width: min(430px, calc(100vw - 24px));
      max-height: calc(100vh - 28px);
      display: flex;
      flex-direction: column;
      transform: translateX(-110%);
      transition: transform 0.24s ease;
      overflow: hidden;
    }

    .drawer.open { transform: translateX(0); }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 252, 246, 0.95);
    }

    .drawer-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 1.7rem;
      line-height: 1;
      color: #2b3f2f;
    }

    .drawer-body {
      padding: 14px 16px 16px;
      overflow: auto;
      display: grid;
      gap: 12px;
    }

    .view { display: none; }
    .view.active { display: block; }

    .section-label {
      margin: 0 0 4px;
      font-weight: 700;
      color: #2f4630;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .subtitle {
      margin: 2px 0 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    label { font-size: 0.84rem; color: #3a4a39; font-weight: 600; }

    input, select, textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #d3c8b8;
      background: #fffef9;
      color: var(--ink);
      font-family: inherit;
      font-size: 0.94rem;
      padding: 10px 11px;
    }

    textarea { min-height: 74px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      outline: 2px solid rgba(47, 110, 79, 0.25);
      border-color: #8bb69b;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .hint {
      margin: 0;
      font-size: 0.8rem;
      color: #5a6b59;
    }

    .status {
      min-height: 20px;
      margin: 0;
      font-size: 0.86rem;
      color: var(--alert);
      font-weight: 600;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
      margin-bottom: 8px;
    }

    .list {
      display: grid;
      gap: 8px;
      max-height: 46vh;
      overflow: auto;
      padding-right: 4px;
    }

    .item {
      border: 1px solid #d8cfbf;
      border-radius: 12px;
      background: #fffdf7;
      padding: 10px;
    }

    .item h4 { margin: 0 0 4px; font-size: 0.96rem; }
    .meta { margin: 0; font-size: 0.79rem; color: #4f624f; }

    .wh-link {
      color: #1e6f48;
      font-weight: 700;
      text-decoration: none;
    }

    .hours-grid {
      display: grid;
      gap: 8px;
      margin-top: 4px;
      border: 1px solid #ddcfbd;
      border-radius: 12px;
      padding: 10px;
      background: #fffdf8;
    }

    .day-row {
      display: grid;
      grid-template-columns: 1fr 100px 100px;
      gap: 8px;
      align-items: center;
    }

    .day-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .day-check input { width: auto; }

    .day-row input[type="time"] {
      padding: 8px;
      font-size: 0.84rem;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 14px;
      border: 1px solid #cfbfa8;
      box-shadow: 0 12px 24px rgba(18, 27, 20, 0.22);
    }

    .popup-name { margin: 0 0 4px; font-weight: 800; font-size: 1.05rem; color: #1f3725; }
    .popup-line { margin: 0 0 5px; font-size: 0.84rem; color: #344734; }

    .map-pin-drop {
      position: relative;
      display: block;
      width: 22px;
      height: 22px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: var(--pin-color, #1f2a1f);
      border: 2px solid #fff;
      box-shadow: 0 6px 14px rgba(18, 27, 20, 0.3);
    }

    .map-pin-drop::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      top: 5px;
      left: 5px;
      background: rgba(255, 255, 255, 0.75);
    }

    @media (max-width: 980px) {
      .left-menu { width: calc(100vw - 26px); }
      .legend { width: 180px; font-size: 0.75rem; }
      .day-row { grid-template-columns: 1fr 84px 84px; }
    }

    @media (max-width: 820px) {
      body {
        -webkit-tap-highlight-color: transparent;
      }

      input, select, textarea, button {
        font-size: 16px;
        min-height: 46px;
      }

      .legend-toggle {
        display: inline-flex;
        align-items: center;
      }

      .legend {
        top: 58px;
        right: 8px;
        left: 8px;
        width: auto;
        max-height: 48dvh;
        overflow: auto;
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .legend.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .left-menu {
        top: auto;
        left: 8px;
        right: 8px;
        bottom: calc(8px + env(safe-area-inset-bottom));
        width: auto;
        padding: 8px;
        gap: 8px;
        grid-template-columns: 1fr 1fr;
      }

      .title-mini { display: none; }

      .drawer {
        top: auto;
        bottom: 0;
        left: 0;
        width: 100vw;
        max-height: 86dvh;
        border-radius: 20px 20px 0 0;
        transform: translateY(105%);
      }

      .drawer.open { transform: translateY(0); }

      .drawer-head {
        position: sticky;
        top: 0;
        z-index: 2;
      }

      .drawer-body {
        padding-bottom: calc(18px + env(safe-area-inset-bottom));
      }

      .drawer-title { font-size: 1.5rem; }

      .filters,
      .grid2,
      .btn-row {
        grid-template-columns: 1fr;
      }

      .list {
        max-height: 34dvh;
      }

      .day-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="map-wrap">
      <div id="map"></div>
      <button id="btnToggleLegend" class="legend-toggle" type="button">ver leyenda</button>
      <div class="legend">
        <h3>Leyenda</h3>
        <div id="legendList"></div>
      </div>
    </section>

    <aside class="card left-menu">
      <h2 class="title-mini">Valle Sagrado</h2>
      <button id="btnOpenInfo" class="btn-menu" type="button">ver información</button>
      <button id="btnOpenAdd" class="btn-menu" type="button">agregar un lugar</button>
    </aside>

    <aside id="drawer" class="card drawer" aria-hidden="true">
      <div class="drawer-head">
        <h1 id="drawerTitle" class="drawer-title">Directorio Amarillo</h1>
        <button id="btnCloseDrawer" type="button">cerrar</button>
      </div>
      <div class="drawer-body">
        <section id="infoView" class="view active">
          <p class="subtitle">Directorio colaborativo del Valle Sagrado del Perú.</p>
          <div class="filters">
            <div>
              <label for="searchInput">Nombre o servicio</label>
              <input id="searchInput" type="text" placeholder="Ej: médico, sushi, importaciones" />
            </div>
            <div>
              <label for="filterCategory">Categoría</label>
              <select id="filterCategory">
                <option value="all">Todas</option>
              </select>
            </div>
          </div>

          <div class="btn-row">
            <button id="btnExport" type="button">Exportar JSON</button>
            <button id="btnImport" type="button">Importar JSON</button>
          </div>
          <input id="jsonFile" type="file" accept="application/json" style="display:none" />

          <p class="section-label" style="margin-top:12px">Lugares visibles</p>
          <div id="itemsList" class="list"></div>
        </section>

        <section id="addView" class="view">
          <p class="section-label">Agregar un lugar</p>
          <p class="hint">Haz clic en el mapa para marcar la ubicación. El nombre y la dirección se completan automáticamente.</p>

          <div class="grid2">
            <div>
              <label for="placeName">Nombre del lugar</label>
              <input id="placeName" type="text" placeholder="Nombre comercial" />
            </div>
            <div>
              <label for="category">Categoría</label>
              <select id="category">
              </select>
            </div>
          </div>

          <div class="grid2">
            <div>
              <label for="contactName">Publicado por</label>
              <input id="contactName" type="text" placeholder="Tu nombre" />
            </div>
            <div>
              <label for="whatsapp">WhatsApp del negocio</label>
              <input id="whatsapp" type="text" placeholder="+51999..." />
            </div>
          </div>

          <div>
            <label for="address">Dirección / referencia</label>
            <input id="address" type="text" placeholder="Pisac, Urubamba, Ollantaytambo..." />
          </div>

          <div>
            <label>Horarios por día</label>
            <div id="hoursGrid" class="hours-grid"></div>
          </div>

          <div>
            <label for="description">Descripción</label>
            <textarea id="description" placeholder="Qué ofrece, especialidades, precios aproximados..."></textarea>
          </div>

          <div class="grid2">
            <div>
              <label for="lat">Latitud</label>
              <input id="lat" type="number" step="0.000001" placeholder="-13.32" />
            </div>
            <div>
              <label for="lng">Longitud</label>
              <input id="lng" type="number" step="0.000001" placeholder="-72.08" />
            </div>
          </div>

          <div class="btn-row">
            <button id="btnGeocode" type="button" class="btn-secondary">Ubicar dirección</button>
            <button id="btnAdd" type="button" class="btn-primary">Agregar marcador</button>
          </div>
        </section>

        <p id="status" class="status"></p>
      </div>
    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const STORAGE_KEY = "directorio_valle_sagrado_v2";

    const DAYS = [
      { key: "lun", label: "Lunes" },
      { key: "mar", label: "Martes" },
      { key: "mie", label: "Miércoles" },
      { key: "jue", label: "Jueves" },
      { key: "vie", label: "Viernes" },
      { key: "sab", label: "Sábado" },
      { key: "dom", label: "Domingo" },
    ];

    const CATEGORIES = {
      retiro_0_20: { label: "espacios de retiro (de 0 a 20 pers)", color: "#8b5a2b" },
      retiro_20_40: { label: "espacios de retiro (de 20 a 40 pers)", color: "#9f6a35" },
      retiro_40_60: { label: "espacios de retiro (de 40 a 60 pers)", color: "#b2783f" },
      eventos_holisticos: { label: "espacios en alquiler para eventos holisticos", color: "#5e7c3a" },
      restaurantes: { label: "restaurantes", color: "#d18c2c" },
      panaderia_autor: { label: "panaderia de autor", color: "#c17a52" },
      ropa_conceptual: { label: "ropa conceptual", color: "#7a5fb0" },
      medico: { label: "medico", color: "#e0553e" },
      canchas_tennis: { label: "canchas de tennis", color: "#2f8a5d" },
      piscinas: { label: "piscinas", color: "#2d78b8" },
      lavanderias: { label: "lavanderias", color: "#4a94c9" },
      mudanzas: { label: "mudanzas", color: "#5d6775" },
      clases_adultos: { label: "clases interactivas adultos", color: "#a55d8f" },
      clases_ninos: { label: "clases interactivas ninos", color: "#e38a9b" },
      otro: { label: "otro", color: "#6b5ea8" },
    };

    const SACRED_VALLEY_BOUNDS = L.latLngBounds([
      [-13.62, -72.45],
      [-13.14, -71.75],
    ]);

    const map = L.map("map", {
      maxBounds: SACRED_VALLEY_BOUNDS,
      maxBoundsViscosity: 0.9,
      minZoom: 10,
      maxZoom: 18,
      zoomControl: true,
    }).setView([-13.315, -72.084], 11);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors",
    }).addTo(map);

    const drawer = document.getElementById("drawer");
    const drawerTitle = document.getElementById("drawerTitle");
    const infoView = document.getElementById("infoView");
    const addView = document.getElementById("addView");

    const searchInput = document.getElementById("searchInput");
    const filterCategory = document.getElementById("filterCategory");
    const categorySelect = document.getElementById("category");
    const legendList = document.getElementById("legendList");
    const legend = document.querySelector(".legend");
    const btnToggleLegend = document.getElementById("btnToggleLegend");
    const statusEl = document.getElementById("status");
    const itemsList = document.getElementById("itemsList");
    const hoursGrid = document.getElementById("hoursGrid");

    let places = loadPlaces();
    let markers = [];
    let pendingMarker = null;

    const fields = {
      placeName: document.getElementById("placeName"),
      category: document.getElementById("category"),
      contactName: document.getElementById("contactName"),
      whatsapp: document.getElementById("whatsapp"),
      address: document.getElementById("address"),
      description: document.getElementById("description"),
      lat: document.getElementById("lat"),
      lng: document.getElementById("lng"),
    };

    function buildHoursGrid() {
      hoursGrid.innerHTML = DAYS.map((d) => `
        <div class="day-row" data-day="${d.key}">
          <label class="day-check"><input type="checkbox" data-role="enabled" /> ${d.label}</label>
          <input type="time" data-role="open" disabled />
          <input type="time" data-role="close" disabled />
        </div>
      `).join("");

      hoursGrid.querySelectorAll(".day-row").forEach((row) => {
        const enabled = row.querySelector('[data-role="enabled"]');
        const open = row.querySelector('[data-role="open"]');
        const close = row.querySelector('[data-role="close"]');
        enabled.addEventListener("change", () => {
          const active = enabled.checked;
          open.disabled = !active;
          close.disabled = !active;
          if (!active) {
            open.value = "";
            close.value = "";
          }
        });
      });
    }

    function populateCategoryControls() {
      const options = Object.entries(CATEGORIES)
        .map(([key, value]) => `<option value="${key}">${sanitize(value.label)}</option>`)
        .join("");
      filterCategory.innerHTML = `<option value="all">Todas</option>${options}`;
      categorySelect.innerHTML = options;
    }

    function renderLegend() {
      legendList.innerHTML = Object.values(CATEGORIES)
        .map((category) => `<div class="legend-item"><span class="dot" style="background:${category.color}"></span> ${sanitize(category.label)}</div>`)
        .join("");
    }

    function collectHours() {
      const out = {};
      hoursGrid.querySelectorAll(".day-row").forEach((row) => {
        const day = row.dataset.day;
        const enabled = row.querySelector('[data-role="enabled"]').checked;
        if (!enabled) return;
        const open = row.querySelector('[data-role="open"]').value;
        const close = row.querySelector('[data-role="close"]').value;
        if (open && close) out[day] = { open, close };
      });
      return out;
    }

    function hoursToText(hours) {
      if (!hours || typeof hours !== "object") return "No indicado";
      const parts = [];
      for (const d of DAYS) {
        const h = hours[d.key];
        if (!h) continue;
        parts.push(`${d.label}: ${h.open}-${h.close}`);
      }
      return parts.length ? parts.join(" · ") : "No indicado";
    }

    function resetHoursGrid() {
      hoursGrid.querySelectorAll(".day-row").forEach((row) => {
        row.querySelector('[data-role="enabled"]').checked = false;
        const open = row.querySelector('[data-role="open"]');
        const close = row.querySelector('[data-role="close"]');
        open.value = "";
        close.value = "";
        open.disabled = true;
        close.disabled = true;
      });
    }

    function loadPlaces() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (_e) {
        return [];
      }
    }

    function savePlaces() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(places));
    }

    function showStatus(message, isError = true) {
      statusEl.style.color = isError ? "#8b2e1a" : "#1e6f48";
      statusEl.textContent = message;
      setTimeout(() => {
        if (statusEl.textContent === message) statusEl.textContent = "";
      }, 3600);
    }

    function sanitize(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalizeWhatsapp(raw) {
      const digits = String(raw || "").replace(/[^\d+]/g, "");
      return digits ? (digits.startsWith("+") ? digits : `+${digits}`) : "";
    }

    function whatsappLink(phone) {
      const clean = normalizeWhatsapp(phone).replace("+", "");
      return clean ? `https://wa.me/${clean}` : "";
    }

    function ensureDrawerOpen(view) {
      drawer.classList.add("open");
      drawer.setAttribute("aria-hidden", "false");
      if (view === "add") {
        infoView.classList.remove("active");
        addView.classList.add("active");
        drawerTitle.textContent = "Agregar un lugar";
      } else {
        addView.classList.remove("active");
        infoView.classList.add("active");
        drawerTitle.textContent = "Ver información";
      }
    }

    function closeDrawer() {
      drawer.classList.remove("open");
      drawer.setAttribute("aria-hidden", "true");
    }

    function toggleLegend() {
      legend.classList.toggle("open");
      btnToggleLegend.textContent = legend.classList.contains("open") ? "ocultar leyenda" : "ver leyenda";
    }

    function makeDropIcon(color) {
      return L.divIcon({
        className: "",
        html: `<span class="map-pin-drop" style="--pin-color:${color}"></span>`,
        iconSize: [22, 22],
        iconAnchor: [11, 22],
        popupAnchor: [0, -18],
      });
    }

    async function reverseGeocode(lat, lng) {
      try {
        const url = `https://nominatim.openstreetmap.org/reverse?format=json&zoom=18&addressdetails=1&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lng)}`;
        const res = await fetch(url, { headers: { Accept: "application/json" } });
        if (!res.ok) return null;
        const data = await res.json();
        const address = String(data.display_name || "").trim();
        const name = String(
          data.name
            || data.address?.amenity
            || data.address?.tourism
            || data.address?.shop
            || data.address?.building
            || data.address?.road
            || ""
        ).trim();
        return {
          name: name || null,
          address: address || null,
        };
      } catch (_e) {
        return null;
      }
    }

    function createMarker(place) {
      const category = CATEGORIES[place.category] || CATEGORIES.otro;
      const marker = L.marker([place.lat, place.lng], {
        icon: makeDropIcon(category.color),
      }).addTo(map);

      const wa = place.whatsapp
        ? `<a class="wh-link" href="${whatsappLink(place.whatsapp)}" target="_blank" rel="noopener">WhatsApp: ${sanitize(place.whatsapp)}</a>`
        : "Sin WhatsApp";

      marker.bindPopup(
        `<p class="popup-name">${sanitize(place.placeName)}</p>
         <p class="popup-line"><strong>${sanitize(category.label)}</strong></p>
         <p class="popup-line">${sanitize(place.address || "Sin dirección")}</p>
         <p class="popup-line">Horario: ${sanitize(hoursToText(place.hours))}</p>
         <p class="popup-line">${wa}</p>
         <p class="popup-line">${sanitize(place.description || "")}</p>
         <p class="popup-line">Publicado por: ${sanitize(place.contactName || "Anónimo")}</p>`
      );

      return marker;
    }

    function clearMarkers() {
      markers.forEach((m) => map.removeLayer(m));
      markers = [];
    }

    function filteredPlaces() {
      const q = searchInput.value.trim().toLowerCase();
      const cat = filterCategory.value;
      return places.filter((p) => {
        const byCategory = cat === "all" || p.category === cat;
        const haystack = `${p.placeName} ${p.address} ${p.description} ${hoursToText(p.hours)} ${p.contactName}`.toLowerCase();
        const byQuery = !q || haystack.includes(q);
        return byCategory && byQuery;
      });
    }

    function render() {
      clearMarkers();
      const list = filteredPlaces();

      list.forEach((place) => markers.push(createMarker(place)));

      itemsList.innerHTML = list.length
        ? list.map((p) => {
            const cat = CATEGORIES[p.category] || CATEGORIES.otro;
            const wa = p.whatsapp
              ? `<a class="wh-link" href="${whatsappLink(p.whatsapp)}" target="_blank" rel="noopener">${sanitize(p.whatsapp)}</a>`
              : "Sin WhatsApp";
            return `<article class="item">
              <h4>${sanitize(p.placeName)}</h4>
              <p class="meta">${sanitize(cat.label)} · ${sanitize(p.address || "sin dirección")}</p>
              <p class="meta">Horario: ${sanitize(hoursToText(p.hours))}</p>
              <p class="meta">WhatsApp: ${wa}</p>
            </article>`;
          }).join("")
        : '<p class="meta">No hay resultados con ese filtro.</p>';
    }

    function validatePlace(place) {
      if (!place.placeName || place.placeName.length < 2) return "Ingresa un nombre válido del lugar.";
      if (!Number.isFinite(place.lat) || !Number.isFinite(place.lng)) return "Selecciona una ubicación válida en el mapa.";
      if (!SACRED_VALLEY_BOUNDS.contains([place.lat, place.lng])) return "El marcador debe estar dentro del Valle Sagrado del Perú.";
      if (place.whatsapp && !/^\+?\d{8,15}$/.test(place.whatsapp.replace(/\s+/g, ""))) return "El WhatsApp parece inválido.";
      if (!place.hours || Object.keys(place.hours).length === 0) return "Selecciona al menos un día con horario de apertura.";
      return "";
    }

    function readPlaceFromForm() {
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}_${Math.random().toString(16).slice(2)}`,
        placeName: fields.placeName.value.trim(),
        category: fields.category.value,
        contactName: fields.contactName.value.trim(),
        whatsapp: fields.whatsapp.value.trim(),
        hours: collectHours(),
        address: fields.address.value.trim(),
        description: fields.description.value.trim(),
        lat: Number(fields.lat.value),
        lng: Number(fields.lng.value),
        createdAt: new Date().toISOString(),
      };
    }

    function resetForm() {
      fields.placeName.value = "";
      fields.contactName.value = "";
      fields.whatsapp.value = "";
      fields.address.value = "";
      fields.description.value = "";
      fields.lat.value = "";
      fields.lng.value = "";
      resetHoursGrid();
      if (pendingMarker) {
        map.removeLayer(pendingMarker);
        pendingMarker = null;
      }
    }

    map.on("click", async (evt) => {
      const lat = evt.latlng.lat.toFixed(6);
      const lng = evt.latlng.lng.toFixed(6);
      fields.lat.value = lat;
      fields.lng.value = lng;

      if (pendingMarker) map.removeLayer(pendingMarker);
      pendingMarker = L.marker([Number(lat), Number(lng)], {
        icon: makeDropIcon("#1f2a1f"),
      }).addTo(map);

      const fallbackName = `Lugar ${lat}, ${lng}`;
      const fallbackAddress = `Punto seleccionado en mapa (${lat}, ${lng})`;
      fields.placeName.value = fallbackName;
      fields.address.value = fallbackAddress;

      const reverse = await reverseGeocode(lat, lng);
      if (reverse?.name) fields.placeName.value = reverse.name;
      if (reverse?.address) fields.address.value = reverse.address;

      ensureDrawerOpen("add");
      showStatus("Ubicación fijada con nombre y dirección autocompletados.", false);
    });

    document.getElementById("btnOpenInfo").addEventListener("click", () => ensureDrawerOpen("info"));
    document.getElementById("btnOpenAdd").addEventListener("click", () => ensureDrawerOpen("add"));
    document.getElementById("btnCloseDrawer").addEventListener("click", closeDrawer);
    btnToggleLegend.addEventListener("click", toggleLegend);

    document.getElementById("btnGeocode").addEventListener("click", async () => {
      const query = fields.address.value.trim();
      if (!query) {
        showStatus("Escribe una dirección o referencia primero.");
        return;
      }
      try {
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=pe&q=${encodeURIComponent(query + " Valle Sagrado Cusco")}`;
        const res = await fetch(url, { headers: { Accept: "application/json" } });
        const data = await res.json();
        if (!Array.isArray(data) || !data[0]) {
          showStatus("No encontré esa dirección. Prueba con un distrito (Pisac, Urubamba, etc.).");
          return;
        }
        const lat = Number(data[0].lat);
        const lng = Number(data[0].lon);
        fields.lat.value = lat.toFixed(6);
        fields.lng.value = lng.toFixed(6);
        map.flyTo([lat, lng], 14, { duration: 0.8 });
        if (pendingMarker) map.removeLayer(pendingMarker);
        pendingMarker = L.marker([lat, lng], {
          icon: makeDropIcon("#1f2a1f"),
        }).addTo(map);
        ensureDrawerOpen("add");
        showStatus("Dirección ubicada y marcador temporal colocado.", false);
      } catch (_e) {
        showStatus("No se pudo geolocalizar ahora. Intenta de nuevo.");
      }
    });

    document.getElementById("btnAdd").addEventListener("click", () => {
      const place = readPlaceFromForm();
      const err = validatePlace(place);
      if (err) {
        showStatus(err, true);
        return;
      }
      place.whatsapp = normalizeWhatsapp(place.whatsapp);
      places.unshift(place);
      savePlaces();
      render();
      resetForm();
      showStatus("Marcador agregado correctamente al directorio.", false);
      ensureDrawerOpen("info");
    });

    document.getElementById("btnExport").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(places, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "directorio_valle_sagrado.json";
      a.click();
      URL.revokeObjectURL(url);
      showStatus("Exportación completada.", false);
    });

    document.getElementById("btnImport").addEventListener("click", () => {
      document.getElementById("jsonFile").click();
    });

    document.getElementById("jsonFile").addEventListener("change", async (evt) => {
      const file = evt.target.files && evt.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const incoming = JSON.parse(text);
        if (!Array.isArray(incoming)) {
          showStatus("El archivo JSON no es válido.");
          return;
        }
        const valid = incoming
          .map((entry) => ({
            id: entry.id || (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}_${Math.random().toString(16).slice(2)}`),
            placeName: String(entry.placeName || "").trim(),
            category: CATEGORIES[entry.category] ? entry.category : "otro",
            contactName: String(entry.contactName || "").trim(),
            whatsapp: String(entry.whatsapp || "").trim(),
            hours: (entry.hours && typeof entry.hours === "object") ? entry.hours : {},
            address: String(entry.address || "").trim(),
            description: String(entry.description || "").trim(),
            lat: Number(entry.lat),
            lng: Number(entry.lng),
            createdAt: entry.createdAt || new Date().toISOString(),
          }))
          .filter((entry) => !validatePlace(entry));

        if (!valid.length) {
          showStatus("No encontré registros válidos para importar.");
          return;
        }

        places = [...valid, ...places];
        savePlaces();
        render();
        showStatus(`Importación correcta: ${valid.length} lugares agregados.`, false);
      } catch (_e) {
        showStatus("No se pudo importar el archivo JSON.");
      } finally {
        evt.target.value = "";
      }
    });

    searchInput.addEventListener("input", render);
    filterCategory.addEventListener("change", render);

    populateCategoryControls();
    renderLegend();
    buildHoursGrid();
    render();
  </script>
</body>
</html>
